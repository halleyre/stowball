<!doctype html>

<html>

  <head>
    <meta charset="utf-8">
    <title>stowball</title>
  </head>

  <body style="margin:0">
    <canvas style="display:block"></canvas>
    <script type="module">
      const canvas = document.querySelector("canvas");
      const resize = () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize()
      window.addEventListener('resize', resize)
    </script>
  </body>

</html>
